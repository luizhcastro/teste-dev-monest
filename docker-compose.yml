services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cep-api:local
    container_name: cep-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    # logs estruturados JSON — não precisa de driver especial
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
