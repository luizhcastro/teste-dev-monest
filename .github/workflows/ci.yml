name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --no-fix --max-warnings=0

      - name: Unit & integration tests
        run: npm test -- --ci

      - name: E2E tests
        run: npm run test:e2e -- --ci

      - name: Build
        run: npm run build
